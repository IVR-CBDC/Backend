openapi: "3.0.3"
info:
  title: IVR Backend API
  version: "0.1.0"
  description: "-"

servers:
  - url: http://localhost
    description: Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/register:
    post:
      summary: "Регистрация нового пользователя"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
                name:
                  type: string
              required:
                - login
                - password
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  token:
                    type: string
                required:
                  - user_id
                  - token
        "400":
          description: "Bad Request"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "409":
          description: "Conflict"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /api/auth/login:
    post:
      summary: "Авторизация, возвращает JWT"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
              required:
                - login
                - password
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  token:
                    type: string
                required:
                  - user_id
                  - token
        "400":
          description: "Bad Request"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /health:
    get:
      summary: "Health check service-auth"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  version:
                    type: string
                required:
                  - ok
                  - service
                  - version

  /api/core/compute:
    post:
      summary: "Вычисляет сумму 1..n (пример защищённой ручки)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                n:
                  type: integer
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  input_n:
                    type: integer
                  result:
                    type: integer
                required:
                  - user_id
                  - input_n
                  - result
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /api/core/status:
    get:
      summary: "Статус сервиса (защищённый)"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  status:
                    type: string
                  uptime_sec:
                    type: integer
                required:
                  - user_id
                  - status
                  - uptime_sec
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /health2:
    get:
      summary: "Health2"
      description: "Health check с проверкой БД."
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                type: object

  /api/test-python/ping:
    get:
      summary: "Ping"
      description: "Защищённая ручка — пример как использовать JWT-авторизацию."
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  message:
                    type: string
                required:
                  - user_id
                  - message
        "422":
          description: "Validation Error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: array
