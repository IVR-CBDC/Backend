name: Deploy to K3s

on:
  push:
    branches:
      - main # Деплоим при пуше в ветку main

env:
  REGISTRY: ghcr.io
  # github.repository это формат owner/repo, например MyName/IVR-Backend
  IMAGE_NAME_AUTH: ${{ github.repository }}/service-auth
  IMAGE_NAME_CORE: ${{ github.repository }}/service-core
  IMAGE_NAME_TEST: ${{ github.repository }}/service-test-python

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Нужно для пуша в GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Сборка и пуш Auth Service ---
      - name: Extract metadata for auth
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUTH }}
          tags: |
            type=sha,format=short

      - name: Build and push service-auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/service-auth/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}

      # --- Сборка и пуш Core Service ---
      - name: Extract metadata for core
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CORE }}
          tags: |
            type=sha,format=short

      - name: Build and push service-core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/service-core/Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}

      # --- Сборка и пуш Test Python Service ---
      - name: Extract metadata for test
        id: meta-test
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TEST }}
          tags: |
            type=sha,format=short

      - name: Build and push service-test-python
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/service-test-python/Dockerfile
          push: true
          tags: ${{ steps.meta-test.outputs.tags }}
          labels: ${{ steps.meta-test.outputs.labels }}
          
    outputs:
      tag: ${{ fromJSON(steps.meta-auth.outputs.json).labels['org.opencontainers.image.version'] }} # берем sha тег

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Копируем папку helm на сервер, чтобы применить свежие манифесты
      - name: Copy Helm charts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "infra/helm"
          target: "~/deploy-ivr"
          
      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Выполняем helm upgrade на сервере, передавая новые теги образов
          script: |
            export KUBECONFIG=~/.kube/config
            cd ~/deploy-ivr/infra/helm
            
            # Auth
            helm upgrade --install service-auth ./generic-service \
              -f values-service-auth.yaml \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUTH }} \
              --set image.tag=${{ needs.build-and-push.outputs.tag }} \
              --set "imagePullSecrets[0].name=ghcr-secret" \
              -n backend
              
            # Core
            helm upgrade --install service-core ./generic-service \
              -f values-service-core.yaml \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CORE }} \
              --set image.tag=${{ needs.build-and-push.outputs.tag }} \
              --set "imagePullSecrets[0].name=ghcr-secret" \
              -n backend
              
            # Test Python
            helm upgrade --install service-test-python ./generic-service \
              -f values-service-test-python.yaml \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TEST }} \
              --set image.tag=${{ needs.build-and-push.outputs.tag }} \
              --set "imagePullSecrets[0].name=ghcr-secret" \
              -n backend
